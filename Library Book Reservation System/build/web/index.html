<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Book Reservation System</title>
    <style>
        
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        h1, h2 {
            color: #333;
            text-align: center;
        }
        
        
        .nav {
            background-color: #4CAF50;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .nav a {
            color: white;
            text-decoration: none;
            padding: 10px;
            margin-right: 10px;
        }
        
        .nav a:hover {
            background-color: #388E3C;
            border-radius: 3px;
        }
        
       
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        .btn {
            display: inline-block;
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .btn:hover {
            background-color: #388E3C;
        }
        
        .btn-search {
            margin-top: 10px;
        }
        
        
        .search-form {
            margin: 20px 0;
            display: flex;
        }
        
        .search-form input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px 0 0 4px;
        }
        
        .search-form button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }
        
        
        .book-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .book-table th {
            background-color: #4CAF50;
            color: white;
            padding: 12px 15px;
            text-align: left;
        }
        
        .book-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
        }
        
        .book-table tr:hover {
            background-color: #f5f5f5;
        }
        
        .status-available {
            color: green;
            font-weight: bold;
        }
        
        .status-reserved {
            color: red;
            font-weight: bold;
        }
        
        
        .reserve-form {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
        }
        
        .reserve-form h3 {
            margin-top: 0;
            color: #4CAF50;
        }
        
        
        .success-message {
            background-color: #dff0d8;
            color: #3c763d;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            border: 1px solid #d6e9c6;
        }
        
       
        .error-message {
            background-color: #f2dede;
            color: #a94442;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            border: 1px solid #ebccd1;
        }
        
       
        .view {
            display: none;
        }
        
        .view.active {
            display: block;
        }
        
        
        .book-details {
            background-color: #f9f9f9;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #4CAF50;
        }
        
       
        .reservation-details {
            background-color: #f9f9f9;
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
        }
        
        .reservation-details p {
            margin: 10px 0;
        }
        
      
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Library Book Reservation System</h1>
        
        <div class="nav">
            <a href="#" onclick="showView('search-view')">Search Books</a>
            <a href="#" onclick="loadAllBooks()">View All Books</a>
        </div>
        
        
        <div id="search-view" class="view active">
            <h2>Search Books</h2>
            
            <div class="search-form">
                <input type="text" id="search-input" placeholder="Enter book title">
                <button onclick="searchBooks()">Search</button>
            </div>
            
            <div id="search-results"></div>
        </div>
        
        
        <div id="book-list-view" class="view">
            <h2>Book List</h2>
            <div id="book-list-results"></div>
            <div class="footer">
                <button class="btn" onclick="showView('search-view')">Back to Search</button>
            </div>
        </div>
        
        
        <div id="reserve-view" class="view">
            <h2>Reserve Book</h2>
            
            <div id="selected-book-details" class="book-details"></div>
            
            <div id="reservation-error" class="error-message" style="display: none;"></div>
            
            <div class="reserve-form">
                <h3>Student Information</h3>
                <div class="form-group">
                    <label for="student-name">Student Name:</label>
                    <input type="text" id="student-name" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="student-id">Student ID:</label>
                    <input type="text" id="student-id" class="form-control" required>
                </div>
                
                <button class="btn" onclick="reserveBook()">Reserve Book</button>
            </div>
            
            <div class="footer">
                <button class="btn" onclick="showView('book-list-view')">Back to Book List</button>
            </div>
        </div>
        
        
        <div id="success-view" class="view">
            <h2>Reservation Successful</h2>
            
            <div class="success-message">
                <p>Your book has been reserved successfully!</p>
            </div>
            
            <div id="reservation-details" class="reservation-details"></div>
            
            <div class="footer">
                <button class="btn" onclick="showView('search-view')">Search Another Book</button>
                <button class="btn" onclick="loadAllBooks()">View All Books</button>
            </div>
        </div>
    </div>
    
    <script>
        
        let books = [
            { id: 1, title: 'Java Programming', author: 'James Gosling', status: 'Available' },
            { id: 2, title: 'Data Structures', author: 'Robert Lafore', status: 'Available' },
            { id: 3, title: 'Operating Systems', author: 'Andrew Tanenbaum', status: 'Available' },
            { id: 4, title: 'Python Crash Course', author: 'Eric Matthes', status: 'Available' },
            { id: 5, title: 'Clean Code', author: 'Robert C. Martin', status: 'Available' },
            { id: 6, title: 'JavaScript: The Good Parts', author: 'Douglas Crockford', status: 'Available' }
        ];
        
       
        let reservations = [];
        
        let selectedBook = null;
        
        function showView(viewId) {
            
            document.querySelectorAll('.view').forEach(view => {
                view.classList.remove('active');
            });
            
            document.getElementById(viewId).classList.add('active');
        }
        
        function loadAllBooks() {
            renderBookList(books);
            showView('book-list-view');
        }
        
        function searchBooks() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            
            if (!searchTerm.trim()) {
                document.getElementById('search-results').innerHTML = 
                    '<div class="error-message">Please enter a search term</div>';
                return;
            }
            
            const results = books.filter(book => 
                book.title.toLowerCase().includes(searchTerm) || 
                book.author.toLowerCase().includes(searchTerm)
            );
            
            renderBookList(results);
            showView('book-list-view');
        }
        
        function renderBookList(bookList) {
            const resultsDiv = document.getElementById('book-list-results');
            
            if (bookList.length === 0) {
                resultsDiv.innerHTML = '<div class="error-message">No books found matching your search.</div>';
                return;
            }
            
            let html = `
                <table class="book-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            bookList.forEach(book => {
                html += `
                    <tr>
                        <td>${book.title}</td>
                        <td>${book.author}</td>
                        <td class="${book.status === 'Available' ? 'status-available' : 'status-reserved'}">${book.status}</td>
                        <td>
                            ${book.status === 'Available' 
                                ? `<button class="btn" onclick="showReserveForm(${book.id})">Reserve</button>` 
                                : 'Not Available'}
                        </td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
            `;
            
            resultsDiv.innerHTML = html;
        }
        
        function showReserveForm(bookId) {
            selectedBook = books.find(book => book.id === bookId);
            
            if (!selectedBook) {
                alert('Book not found');
                return;
            }
            
            const bookDetailsDiv = document.getElementById('selected-book-details');
            bookDetailsDiv.innerHTML = `
                <h3>${selectedBook.title}</h3>
                <p><strong>Author:</strong> ${selectedBook.author}</p>
                <p><strong>Status:</strong> <span class="status-available">${selectedBook.status}</span></p>
            `;
        
            document.getElementById('reservation-error').style.display = 'none';
            document.getElementById('student-name').value = '';
            document.getElementById('student-id').value = '';
            
            showView('reserve-view');
        }
        
        function reserveBook() {
            const studentName = document.getElementById('student-name').value.trim();
            const studentId = document.getElementById('student-id').value.trim();
            
            if (!studentName || !studentId) {
                const errorDiv = document.getElementById('reservation-error');
                errorDiv.textContent = 'Please fill out all fields.';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!selectedBook) {
                alert('No book selected for reservation');
                return;
            }
            
            const reservation = {
                id: reservations.length + 1,
                studentName: studentName,
                studentId: studentId,
                bookId: selectedBook.id,
                bookTitle: selectedBook.title,
                author: selectedBook.author,
                reservationDate: new Date()
            };
            
            reservations.push(reservation);
            
            const bookIndex = books.findIndex(book => book.id === selectedBook.id);
            if (bookIndex !== -1) {
                books[bookIndex].status = 'Reserved';
            }
            
            const reservationDetailsDiv = document.getElementById('reservation-details');
            reservationDetailsDiv.innerHTML = `
                <p><strong>Book Title:</strong> ${selectedBook.title}</p>
                <p><strong>Author:</strong> ${selectedBook.author}</p>
                <p><strong>Reserved By:</strong> ${studentName}</p>
                <p><strong>Student ID:</strong> ${studentId}</p>
                <p><strong>Reservation Date:</strong> ${formatDate(reservation.reservationDate)}</p>
            `;
            
            showView('success-view');
        }
        
        function formatDate(date) {
            return new Intl.DateTimeFormat('en-US', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            }).format(date);
        }
    </script>
</body>
</html>
